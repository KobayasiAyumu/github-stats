<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Stats Dashboard</title>
  <meta name="description" content="GitHub ユーザーのプロフィール、リポジトリ、言語傾向をまとめて確認できるダッシュボード。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <i class="fa-brands fa-github logo-icon"></i>
        <span class="logo-text">GitHub Stats</span>
      </div>
      <p class="header-sub">プロフィールとリポジトリの傾向を素早く確認</p>
      <button class="theme-btn" id="btn-theme" type="button" aria-label="テーマ切り替え">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </header>

  <main class="main-container">
    <section class="search-section" id="search-section">
      <div class="search-card glass-card">
        <h1 class="search-title">GitHub ユーザーを検索</h1>
        <p class="search-description">ユーザー名を入力すると、主要な統計情報と上位リポジトリを表示します。</p>
        <form class="search-form" id="search-form" aria-label="GitHub ユーザー検索フォーム">
          <div class="search-input-wrapper">
            <i class="fa-brands fa-github search-icon"></i>
            <input
              type="text"
              id="username-input"
              class="search-input"
              placeholder="例: torvalds"
              autocomplete="off"
              aria-label="GitHub ユーザー名"
              required
            />
            <button type="submit" class="search-btn" id="search-btn" aria-label="検索">
              <span class="btn-text">検索</span>
              <i class="fa-solid fa-magnifying-glass btn-icon"></i>
            </button>
          </div>
        </form>
        <div class="history-dropdown hidden" id="history-dropdown"></div>
        <div class="quick-search">
          <span class="quick-label">例:</span>
          <button class="quick-btn" type="button" data-user="torvalds">torvalds</button>
          <button class="quick-btn" type="button" data-user="gaearon">gaearon</button>
          <button class="quick-btn" type="button" data-user="gvanrossum">gvanrossum</button>
        </div>
      </div>
    </section>

    <section class="loading-section hidden" id="loading-section" aria-live="polite">
      <div class="loading-spinner">
        <div class="spinner-ring"></div>
        <p class="loading-text">GitHub からデータを取得中...</p>
      </div>
    </section>

    <section class="error-section hidden" id="error-section" aria-live="assertive">
      <div class="error-card glass-card">
        <i class="fa-solid fa-triangle-exclamation error-icon"></i>
        <h2 class="error-title" id="error-title">エラーが発生しました</h2>
        <p class="error-message" id="error-message"></p>
        <button class="retry-btn" id="retry-btn" type="button">
          <i class="fa-solid fa-rotate-right"></i> 再試行
        </button>
      </div>
    </section>

    <section class="dashboard hidden" id="dashboard">
      <div class="profile-section">
        <div class="profile-card glass-card">
          <div class="profile-header">
            <img id="avatar" class="avatar" src="" alt="プロフィール画像" />
            <div class="profile-info">
              <h2 class="profile-name" id="profile-name"></h2>
              <p class="profile-login" id="profile-login"></p>
              <p class="profile-bio" id="profile-bio"></p>
              <div class="profile-meta">
                <span class="meta-item hidden" id="profile-location">
                  <i class="fa-solid fa-location-dot"></i> <span></span>
                </span>
                <a class="meta-item meta-link hidden" id="profile-blog" href="#" target="_blank" rel="noopener noreferrer">
                  <i class="fa-solid fa-link"></i> <span></span>
                </a>
                <span class="meta-item" id="profile-joined">
                  <i class="fa-solid fa-calendar"></i> <span></span>
                </span>
              </div>
              <a class="github-link-btn" id="github-link" href="#" target="_blank" rel="noopener noreferrer">
                <i class="fa-brands fa-github"></i> GitHub で開く
              </a>
            </div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card glass-card">
            <div class="stat-icon-wrap stat-green"><i class="fa-solid fa-star"></i></div>
            <div class="stat-info">
              <span class="stat-value" id="stat-stars">0</span>
              <span class="stat-label">合計スター数</span>
            </div>
          </div>
          <div class="stat-card glass-card">
            <div class="stat-icon-wrap stat-blue"><i class="fa-solid fa-book"></i></div>
            <div class="stat-info">
              <span class="stat-value" id="stat-repos">0</span>
              <span class="stat-label">公開リポジトリ</span>
            </div>
          </div>
          <div class="stat-card glass-card">
            <div class="stat-icon-wrap stat-purple"><i class="fa-solid fa-users"></i></div>
            <div class="stat-info">
              <span class="stat-value" id="stat-followers">0</span>
              <span class="stat-label">フォロワー</span>
            </div>
          </div>
          <div class="stat-card glass-card">
            <div class="stat-icon-wrap stat-orange"><i class="fa-solid fa-code-fork"></i></div>
            <div class="stat-info">
              <span class="stat-value" id="stat-forks">0</span>
              <span class="stat-label">合計フォーク数</span>
            </div>
          </div>
        </div>
      </div>

      <div class="charts-section">
        <div class="chart-card glass-card">
          <h3 class="chart-title"><i class="fa-solid fa-code"></i> 言語使用比率</h3>
          <div class="lang-chart-wrapper">
            <canvas id="language-chart" aria-label="言語使用比率グラフ"></canvas>
            <div class="lang-legend" id="lang-legend"></div>
          </div>
        </div>

        <div class="chart-card chart-card--wide glass-card">
          <h3 class="chart-title"><i class="fa-solid fa-chart-bar"></i> 最近 12 か月の更新数</h3>
          <div class="activity-chart-wrapper">
            <canvas id="activity-chart" aria-label="最近 12 か月の更新数グラフ"></canvas>
          </div>
        </div>
      </div>

      <div class="repos-section">
        <h3 class="section-title">
          <i class="fa-solid fa-fire"></i> 人気リポジトリ
          <span class="section-subtitle">スター数順</span>
        </h3>
        <div class="repo-grid" id="repo-grid"></div>
      </div>

      <div class="dashboard-actions">
        <button class="action-btn" id="btn-share" type="button">
          <i class="fa-solid fa-share-nodes"></i>
          <span class="btn-text">共有</span>
        </button>
        <button class="action-btn" id="btn-export" type="button">
          <i class="fa-solid fa-download"></i>
          <span class="btn-text">JSON エクスポート</span>
        </button>
        <button class="back-btn" id="back-btn" type="button">
          <i class="fa-solid fa-arrow-left"></i>
          <span class="btn-text">検索に戻る</span>
        </button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>
      Powered by <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener noreferrer">GitHub REST API</a>
      &nbsp;|&nbsp; Built with HTML / CSS / JavaScript
    </p>
  </footer>

  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="charts.js"></script>
  <script src="app.js"></script>
</body>
</html>
